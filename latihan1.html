<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Diri dan Motivasi Belajar Pemrograman</title>
</head>
<body>

<h1>Data Diri dan Motivasi Belajar Pemrograman</h1>

<script>
  // Mendefinisikan data diri
  var nama = "M.LIDIKRI";
  var umur = 18;
  var status = "MAHASISWA POLIBANG";
  
  // Mendefinisikan motivasi belajar
  var motivasi = "Saya ingin menjadi seorang web developer yang handal untuk menciptakan solusi-solusi kreatif dalam dunia teknologi dan ingin bekerja yang gajinya besar dan membanggakan orang tua.";

  // Menampilkan data diri dan motivasi belajar menggunakan alert
  alert("Data Diri:\nNama: " + nama + "\nUmur: " + umur + " tahun\nPekerjaan: " + status + "\n\nMotivasi Belajar:\n" + motivasi);

  // Menampilkan data diri dan motivasi belajar menggunakan console.log
  console.log("Data Diri:");
  console.log("Nama: " + nama);
  console.log("Umur: " + umur + " tahun");
  console.log("Pekerjaan: " + status);
  console.log("\nMotivasi Belajar:");
  console.log(motivasi);

  // Menampilkan data diri dan motivasi belajar menggunakan document.write
  document.write("<h2>Data Diri:</h2>");
  document.write("<p>Nama: " + nama + "</p>");
  document.write("<p>Umur: " + umur + " tahun</p>");
  document.write("<p>Pekerjaan: " + status + "</p>");
  document.write("<h2>Motivasi Belajar:</h2>");
  document.write("<p>" + motivasi + "</p>");
</script>

</body>
</html>
