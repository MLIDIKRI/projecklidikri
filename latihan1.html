<!DOCTYPE html>
<head>MODEL KOMENTAR</head>
<h1>KOMENTAR ADA 2</h1>
<hr>
<script>
    // No. 1 komentar yang pertama
    function joko() {
        let satu = "//ini adalah contoh komentar yang pertama. ini untuk membuat komentar satu baris saja.";
        document.getElementById("demo").innerHTML = satu;
    }
    /* No.2 komentar yang nomer dua */
    function dono() {
        let dua = "/* ini adalah contoh komentar yang kedua. ini untuk membuat komentar dengan beberapa baris. */";
        document.getElementById("demo").innerHTML = dua;
    }
</script>

<body>
    <div id="demo"></div>
    <button onclick="joko()">KOMENTAR 1</button>
    <button onclick="dono()">KOMENTAR 2</button>
</body>
