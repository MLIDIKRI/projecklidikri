<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODEL KOMENTAR</title>
</head>
<body>
    <h1>KOMENTAR ADA 2</h1>
    <hr>
    <script>
        function joko() {
            // Ini adalah contoh komentar yang pertama. ini untuk membuat komentar satu baris saja.
            String stu = "Komentar pertama telah dipanggil.";
            console.log(stu);
        }

        function dono() {
            /*
             Ini adalah contoh komentar yang kedua.
             Komentar ini bisa terdiri dari beberapa baris.
             */
            String dua = "Komentar kedua telah dipanggil.";
            console.log(dua);
        }
    </script>
    <button onclick="joko()">KOMENTAR 1</button>
    <button onclick="dono()">KOMENTAR 2</button>
</body>
</html>
